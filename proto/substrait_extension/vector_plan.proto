syntax = "proto3";

package substrait_extension;

option go_package = "github.com/GreptimeTeam/greptime-proto/go/substrait_extension";

// Vector distance metric
enum VectorDistanceMetric {
  L2SQ = 0;
  COSINE = 1;
  INNERPRODUCT = 2;
}

// Vector scan hint for KNN search
message VectorScan {
  // The input logical plan (Substrait-encoded)
  bytes input = 1;
  // Column ID of the vector column to search
  uint32 column_id = 2;
  // Query vector (f32 values)
  repeated float query_vector = 3;
  // Number of nearest neighbors (k)
  uint32 k = 4;
  // Distance metric
  VectorDistanceMetric metric = 5;
}
